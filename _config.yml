# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme

remote_theme: "mmistakes/minimal-mistakes@4.28.0"
minimal_mistakes_skin: "dark" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum" "sunrise"

title: "Shonenkov AI"
locale: "en-US"
title_separator: ""
subtitle: "ML Research & Engineering"
name: "Alex Shonenkov"
description: "Alex Shonenkov — Data Scientist and ML Research Engineer. Projects, publications, CV, Kaggle Grandmaster, open-source work in CV, NLP, and multimodal ML."
url: "https://shonenkov.github.io"
baseurl: ""
repository: "shonenkov/shonenkov.github.io"
logo: "/assets/images/logo.png"
og_image: "/assets/images/bio-photo.jpg"
breadcrumbs: false
words_per_minute: 200
search: false
paginate:
timezone: UTC

collections:
  achievements:
    output: true
    permalink: /achievements/:name/

layout: single
classes:
  - landing
  - dark-theme

excerpt: "This post should display a **header with a solid background color**, if the theme supports it."
header:
  teaser: "/assets/images/mm-teaser-images-example.jpg"

#excerpt: "This post should display a **header with an overlay image**, if the theme supports it."
#header:
#  image: "/assets/images/mm-teaser-images-example.jpg"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      read_time: true
      comments: false
  # _achievements
  - scope:
      path: ""
      type: achievements
    values:
      layout: achievement
      author_profile: false
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single

