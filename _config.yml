# Analytics
analytics:
  provider               :  "google-universal" # false (default), "google", "google-universal", "custom"
  google:
    tracking_id          : "UA-172113653-1"

after_footer_scripts:
  - /assets/js/theme-toggle.js
  - /assets/js/card-select.js